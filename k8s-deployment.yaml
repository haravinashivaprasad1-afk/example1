apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-cie2-q4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-cie2-q4
  template:
    metadata:
      labels:
        app: devops-cie2-q4
    spec:
      containers:
        - name: devops-cie2-q4
          image: haravinashivaprasad1/devops-cie2-q4:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: devops-cie2-q4-service
spec:
  type: NodePort
  selector:
    app: devops-cie2-q4
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30082
